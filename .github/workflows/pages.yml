# Build Vite site (site/dist) and deploy to GitHub Pages; copies repo-root setup.sh into dist.
# See docs/plans/2026-07-02-1705-vite-shadcn-site/vss-phase-3.0-github-actions.md
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'setup.sh'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - run: npm run build
        working-directory: site
      - name: Sync setup.sh into dist artifact
        run: cp setup.sh site/dist/setup.sh
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: https://sideguard.io/
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 2700000
