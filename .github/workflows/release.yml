# Release workflow: CGO-enabled binaries on v* tags, merged into one GitHub release.
# GoReleaser OSS builds per OS; package-release-assets.sh names archives for internal/update.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and publish (e.g. v0.1.3)"
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - runs-on: macos-latest
            platform_id: darwin
            artifact_name: dist-darwin
            goreleaser_args: build --clean --id darwin
          - runs-on: ubuntu-latest
            platform_id: linux
            goarch: amd64
            artifact_name: dist-linux-amd64
            goreleaser_args: build --clean --id linux --single-target
          - runs-on: ubuntu-24.04-arm
            platform_id: linux
            goarch: arm64
            artifact_name: dist-linux-arm64
            goreleaser_args: build --clean --id linux --single-target
          - runs-on: windows-latest
            platform_id: windows
            artifact_name: dist-windows
            goreleaser_args: build --clean --id windows
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux build dependencies
        if: matrix.platform_id == 'linux'
        run: |
          # ubuntu-latest (24.04) mirrors lack arm64 packages; cross-arch apt fails with 404.
          # Build linux/amd64 natively on amd64 and linux/arm64 on ubuntu-24.04-arm instead.
          # Refs: https://github.com/actions/runner-images/issues/10901
          #       https://github.com/safedep/vet/pull/706
          if [[ "${{ matrix.goarch }}" == "amd64" ]]; then
            sudo sed -i 's/^Types: deb$/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
          fi
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends libayatana-appindicator3-dev

      - name: Setup MSYS2 (Windows)
        if: matrix.platform_id == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Build binaries (linux)
        if: matrix.platform_id == 'linux'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: ${{ matrix.goreleaser_args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ env.RELEASE_TAG }}
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}

      - name: Build binaries
        if: matrix.platform_id != 'linux'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: ${{ matrix.goreleaser_args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ env.RELEASE_TAG }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Merge dist folders
        shell: bash
        run: |
          mkdir -p dist
          for dir in artifacts/dist-*; do
            cp -R "${dir}/." dist/
          done
          ls -la dist/

      - name: Package release archives
        shell: bash
        run: |
          chmod +x scripts/package-release-assets.sh
          ./scripts/package-release-assets.sh "${{ env.RELEASE_TAG }}"

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ env.RELEASE_TAG }}"
          version="${tag#v}"
          assets=(dist/release/*)

          prerelease_flag=()
          if [[ "${tag}" =~ -(alpha|beta|rc|test) ]]; then
            prerelease_flag=(--prerelease)
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "Release ${tag} exists; uploading assets"
            gh release upload "${tag}" "${assets[@]}" --clobber
          else
            args=(release create "${tag}" "${assets[@]}" --title "v${version}")
            args+=("${prerelease_flag[@]}")
            if git rev-parse "${tag}^" >/dev/null 2>&1; then
              args+=(--generate-notes)
            else
              args+=(--notes "Release ${tag}")
            fi
            gh "${args[@]}"
          fi
