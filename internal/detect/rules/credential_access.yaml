# Credential access: reading secrets and key material. Category default: high -> ask.
rules:
  - id: credential-etc-shadow-passwd
    category: credential_access
    reason: 'reading system account/password databases'
    text: '/etc/(shadow|passwd|master\.passwd)'
  - id: credential-ssh-keys
    category: credential_access
    reason: 'reading SSH private keys or authorized_keys'
    text: '(\.ssh/(id_[a-z0-9]+|authorized_keys)|(^|\s|/)id_(rsa|ed25519|ecdsa|dsa)\b)'
  - id: credential-cloud-and-env
    category: credential_access
    reason: 'reading cloud credentials or environment secret files'
    text: '(\.aws/credentials|\.config/gcloud|(^|\s|/)\.env(\.|\s|$)|\.netrc|\.pem\b)'
