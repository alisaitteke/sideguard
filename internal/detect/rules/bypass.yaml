# Bypass: tampering with VibeGuard's own config, hooks, or daemon. NON-OVERRIDABLE
# (user rule packs tagged category: bypass are dropped at load). Default: critical -> deny.
rules:
  - id: bypass-config-files
    category: bypass
    reason: 'touching VibeGuard configuration/hook files'
    text: '\.vibeguard/(hooks\.json|policy\.yaml|config\.yaml|credentials\.yaml)'
  - id: bypass-rules-dir
    category: bypass
    reason: 'touching VibeGuard detect rules directory'
    text: '\.vibeguard/rules(/|\b)'
  - id: bypass-daemon-kill
    category: bypass
    reason: 'killing the VibeGuard daemon process'
    text: '(pkill|killall|kill)\b[\s\S]{0,60}vibeguard'
  - id: bypass-launchctl-unload
    category: bypass
    reason: 'unloading the VibeGuard launch agent'
    text: 'launchctl\s+(unload|remove|bootout)\b[\s\S]{0,120}vibeguard'
